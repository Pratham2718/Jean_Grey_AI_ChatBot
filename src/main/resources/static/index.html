<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jean Grey - AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f1117;
            --surface: #151825;
            --surface2: #1e2235;
            --border: #1e2235;
            --accent: #1d4ed8;
            --accent-light: #60a5fa;
            --text: #e8eaf2;
            --text-muted: #6b7280;
            --user-bubble: #1d4ed8;
            --ai-bubble: #1e2235;
            --font: 'Inter', sans-serif;
        }

        .light {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface2: #f1f5f9;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-muted: #64748b;
            --ai-bubble: #ffffff;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.3s;
        }

        .chat-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }
        /* Header */
    .header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }

    .avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 700;
        color: white;
        flex-shrink: 0;
    }

    .bot-name {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
    }

    .mood-badge {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 20px;
        background: #1a3a6e;
        color: var(--accent-light);
        margin-left: 8px;
        font-weight: 500;
    }

    .status {
        font-size: 11px;
        color: var(--text-muted);
    }

    .header-top { display: flex; align-items: center; }
    .header-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }

    .theme-toggle {
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text-muted);
        width: 34px;
        height: 34px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-left: auto;
    }

    /* Mood bar */
    .mood-bar {
        display: flex;
        gap: 8px;
        padding: 10px 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }

    .mood-btn {
        flex: 1;
        padding: 7px 0;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text-muted);
        font-size: 12px;
        font-family: var(--font);
        cursor: pointer;
        transition: all 0.2s;
    }

    .mood-btn.active {
        background: #1a3a6e;
        color: var(--accent-light);
        border-color: var(--accent);
    }

    /* Chat area */
    .chat-area {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message {
        display: flex;
        gap: 8px;
        align-items: flex-end;
        animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .mini-avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 700;
        color: white;
        flex-shrink: 0;
    }

    .bubble {
        max-width: 75%;
        padding: 10px 14px;
        font-size: 13px;
        line-height: 1.6;
        word-break: break-word;
    }

    .ai-bubble {
        background: var(--ai-bubble);
        color: var(--text);
        border-radius: 16px 16px 16px 4px;
        border: 1px solid var(--border);
    }

    .user-bubble {
        background: var(--user-bubble);
        color: white;
        border-radius: 16px 16px 4px 16px;
    }

    /* Typing indicator */
    .typing {
        display: flex;
        gap: 4px;
        align-items: center;
        padding: 12px 14px;
    }

    .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent-light);
        animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
        40% { transform: translateY(-4px); opacity: 1; }
    }

    /* Input area */
    .input-area {
        display: flex;
        gap: 8px;
        padding: 12px 16px;
        background: var(--surface);
        border-top: 1px solid var(--border);
        flex-shrink: 0;
    }

    #user-input {
        flex: 1;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 14px;
        color: var(--text);
        font-size: 13px;
        font-family: var(--font);
        outline: none;
    }

    #user-input::placeholder { color: var(--text-muted); }
    #user-input:focus { border-color: var(--accent); }

    .send-btn {
        background: var(--accent);
        border: none;
        color: white;
        width: 38px;
        height: 38px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.2s;
    }

    .send-btn:hover { opacity: 0.85; }

    /* Footer */
    .footer {
        text-align: center;
        font-size: 11px;
        color: var(--text-muted);
        padding: 8px;
        background: var(--surface);
        border-top: 1px solid var(--border);
    }
    </style>
</head>
<body>
<div class="chat-container" id="app">

    <!-- Header -->
    <div class="header">
        <div class="avatar">JG</div>
        <div class="header-info">
            <div class="header-top">
                <span class="bot-name">Jean Grey</span>
                <span class="mood-badge" id="mood-badge">Friendly</span>
            </div>
            <span class="status">Online · AI Assistant</span>
        </div>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">☀</button>
    </div>

    <!-- Mood selector -->
    <div class="mood-bar">
        <button class="mood-btn active" onclick="switchMood('friendly', this)">Friendly</button>
        <button class="mood-btn" onclick="switchMood('calm', this)">Calm</button>
        <button class="mood-btn" onclick="switchMood('energetic', this)">Energetic</button>
    </div>

    <!-- Chat messages -->
    <div class="chat-area" id="chat-area">
        <div class="message ai">
            <div class="mini-avatar">JG</div>
            <div class="bubble ai-bubble">
                Hey Pratham! I'm Jean Grey, your AI companion.
                How can I help you today? 😊
            </div>
        </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
        <input type="text" id="user-input"
               placeholder="Type a message..."
               onkeydown="if(event.key==='Enter') sendMessage()"/>
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>

    <!-- Footer -->
    <div class="footer">Built by Pratham Kumar</div>

</div>
<script>
    let isDark = true;

    function toggleTheme() {
        isDark = !isDark;
        document.getElementById('app').className = isDark ? 'chat-container' : 'chat-container light';
        document.getElementById('theme-toggle').textContent = isDark ? '☀' : '☾';
    }

    function switchMood(mood, btn) {
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const labels = { friendly: 'Friendly', calm: 'Calm', energetic: 'Energetic' };
        document.getElementById('mood-badge').textContent = labels[mood];

        fetch('/api/mood', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mood: mood })
        });
    }

    function appendMessage(role, text) {
        const chatArea = document.getElementById('chat-area');

        const msg = document.createElement('div');
        msg.className = `message ${role}`;

        if (role === 'ai') {
            msg.innerHTML = `
                <div class="mini-avatar">JG</div>
                <div class="bubble ai-bubble">${text.replace(/\\n/g, '<br>')}</div>`;
        } else {
            msg.innerHTML = `<div class="bubble user-bubble">${text}</div>`;
        }

        chatArea.appendChild(msg);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function showTyping() {
        const chatArea = document.getElementById('chat-area');
        const typing = document.createElement('div');
        typing.className = 'message ai';
        typing.id = 'typing-indicator';
        typing.innerHTML = `
            <div class="mini-avatar">JG</div>
            <div class="bubble ai-bubble typing">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>`;
        chatArea.appendChild(typing);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function hideTyping() {
        const el = document.getElementById('typing-indicator');
        if (el) el.remove();
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        appendMessage('user', text);
        input.value = '';
        showTyping();

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userMessage: text })
            });

            const data = await response.json();
            hideTyping();
            appendMessage('ai', data.reply);

            const mood = data.mood;
            const labels = { friendly: 'Friendly', calm: 'Calm', energetic: 'Energetic' };
            document.getElementById('mood-badge').textContent = labels[mood];

        } catch (error) {
            hideTyping();
            appendMessage('ai', 'Oops! Make sure your Java server is running on localhost:8080!');
        }
    }
</script>
</body>
</html>
